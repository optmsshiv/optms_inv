<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coming Soon | Plumbing Services</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            padding: 40px;
        }

        .logo {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo span {
            color: #00c6ff;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        p {
            opacity: .8;
            margin-bottom: 40px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            min-width: 90px;
        }

        .box h2 {
            font-size: 32px;
        }

        .box span {
            font-size: 14px;
            opacity: .7;
        }

        .notify {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .notify input {
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            width: 220px;
        }

        .notify button {
            background: #00c6ff;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .notify button:hover {
            background: #0096c7;
        }

        .contact {
            margin-top: 20px;
            font-size: 14px;
            opacity: .8;
        }

        .social {
            margin-top: 25px;
        }

        .social a {
            margin: 0 10px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            opacity: .8;
        }

        .social a:hover {
            opacity: 1;
        }

        @media(max-width:600px) {

            h1 {
                font-size: 32px;
            }

            .countdown {
                flex-wrap: wrap;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">🔧 Aqua<span>Fix</span> Plumbing</div>

        <h1>Website Launching Soon</h1>

        <p>
            We are building a powerful plumbing service platform to provide
            fast, reliable and professional plumbing solutions.
        </p>

        <div class="countdown">

            <div class="box">
                <h2 id="days">00</h2>
                <span>Days</span>
            </div>

            <div class="box">
                <h2 id="hours">00</h2>
                <span>Hours</span>
            </div>

            <div class="box">
                <h2 id="minutes">00</h2>
                <span>Minutes</span>
            </div>

            <div class="box">
                <h2 id="seconds">00</h2>
                <span>Seconds</span>
            </div>

        </div>

        <div class="notify">
            <input type="email" placeholder="Enter your email">
            <button>Notify Me</button>
        </div>

        <div class="contact">
            📞 +91 XXXXX XXXXX
            <br>
            📍 Serving your city soon
        </div>

        <div class="social">
            <a href="#">🌐</a>
            <a href="#">📘</a>
            <a href="#">📷</a>
        </div>

    </div>

    <script>

        const launchDate = new Date("May 30, 2026 00:00:00").getTime();

        const timer = setInterval(function () {

            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(timer);
                document.querySelector(".countdown").innerHTML = "We Are Live!";
            }

        }, 1000);

    </script>

</body>

</html>
